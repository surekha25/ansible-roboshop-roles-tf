- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: app-setup.yaml

- name: app setup
  ansible.builtin.import_role:
    name: common
    tasks_from: java.yaml

- name: install mysql python libraries
  ansible.builtin.pip:
    executable: pip3.9
    name: "{{ item }}"
  loop:
  - cryptography
  - PyMySQL

- name: import shipping data into mysql
  community.mysql.mysql_db:
    state: import
    name: all
    login_host: mysql-dev.internal
    login_user: root
    login_password: RoboShop@1
    target: "{{ item }}"
  loop:
  - /app/db/schema.sql
  - /app/db/app-user.sql 
  - /app/db/master-data.sql

- name: system setup
  ansible.builtin.import_role:
    name: common
    tasks_from: system-setup.yaml